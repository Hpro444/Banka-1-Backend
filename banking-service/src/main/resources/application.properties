spring.application.name=banking-service
server.port=${BANKING_SERVER_PORT:8090}

# JWT Security
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.expiration-time=3600000
banka.security.permissions-claim=permissions
banka.security.permit-all=/auth/*,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/**,/hello
jwt.secret=${JWT_SECRET}
token.refresh.expiration-time=1
token.confirmation.expiration-time=15

# Single database (all 4 services share one schema)
spring.datasource.url=jdbc:postgresql://${BANKING_DB_HOST}:${BANKING_DB_PORT}/${BANKING_DB_NAME}
spring.datasource.username=${BANKING_DB_USER}
spring.datasource.password=${BANKING_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.queue=${NOTIFICATION_QUEUE}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY}

# External service URLs (services NOT included in this monolith)
services.user.url=${SERVICES_USER_URL}
services.card.url=${SERVICES_CARD_URL:http://localhost:8087}
services.verification.url=${SERVICES_VERIFICATION_URL}
services.exchange.url=${SERVICES_EXCHANGE_URL}
services.client.url=http://${CLIENT_SERVICE_HOST:localhost}:${CLIENT_SERVER_PORT:8083}

# Feature flags
account.verification.skip=${SKIP_VERIFICATION:true}
transaction.verification.skip=${SKIP_VERIFICATION:true}
transfer.verification.skip=${SKIP_VERIFICATION:true}

# OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
server.forward-headers-strategy=FRAMEWORK
management.endpoints.web.exposure.include=*
management.endpoint.health.probes.enabled=true

# Logging
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate=ERROR

# Misc
my.random.seed=1
url.reset-password=http://localhost:4200/auth/reset-password?token=
url.activate-account=http://localhost:4200/auth/activate-account?token=
